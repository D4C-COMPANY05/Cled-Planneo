name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # bouton "Run workflow" manuel

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile || yarn install

      - name: Build React bundle (CRA -> frontend/build)
        working-directory: frontend
        run: |
          yarn build
          ls -la build

      - name: Install Capacitor CLI and android runtime
        working-directory: frontend
        run: |
          yarn add -D @capacitor/cli
          yarn add @capacitor/core @capacitor/android

      - name: Copy capacitor config into frontend
        run: cp capacitor.config.json frontend/capacitor.config.json

      - name: Patch webDir for in-frontend capacitor
        working-directory: frontend
        run: |
          node -e "let c=require('./capacitor.config.json');c.webDir='build';require('fs').writeFileSync('capacitor.config.json',JSON.stringify(c,null,2))"

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Sync web assets into native project
        working-directory: frontend
        run: npx cap sync android

      - name: Patch AndroidManifest — adjustPan (fix clavier Android)
        working-directory: frontend/android/app/src/main
        run: |
          sed -i 's/android:name="com.cled.planneo.MainActivity"/android:name="com.cled.planneo.MainActivity"\n            android:windowSoftInputMode="adjustPan"/' AndroidManifest.xml
          echo "=== Manifest patché ==="
          grep -A2 "MainActivity" AndroidManifest.xml

      - name: Grant gradlew execute
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk cleds-planneo.apk
          ls -la cleds-planneo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleds-planneo-apk
          path: cleds-planneo.apk
          if-no-files-found: error
